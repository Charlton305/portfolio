<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      font-size: 62.5%;
    }

    body {
      font-family: 'Montserrat', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      gap: 6rem;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 3rem;
      line-height: 1.3;
      color: #4b5563;
    }

    h1 {
      margin: 0;
      font-size: clamp(8rem, 15vw, 15rem);
      letter-spacing: -0.2rem;
      background: linear-gradient(135deg, #0383b2 0%, #69d7f3 100%);
      -webkit-text-fill-color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      font-weight: 700;
    }

    h2 {
      color: #4b5563;
      font-size: clamp(2rem, 4.5vw, 2.5rem);
      margin: 0;
      font-weight: 400;
    }

    .button-container {
      margin-top: 2rem;
    }

    .cta-btn {
      border-image: linear-gradient(135deg, #0383b2 0%, #69d7f3 100%);
      border-image-slice: 1;
      border-style: solid;
      border-width: 2px;
      color: transparent;
      background-image: linear-gradient(135deg, #0383b2 0%, #69d7f3 100%);
      -webkit-text-fill-color: transparent;
      background-clip: text;
      -webkit-background-clip: text;
      font-size: 2.4rem;
      font-weight: bold;
      line-height: 1;
      padding: 0.8rem 1.6rem;
      position: relative;
      text-decoration: none;
      transition: all cubic-bezier(0.19, 1, 0.22, 1) 0.6s;
      display: inline-block;
      width: 190px;
    }

    .cta-btn::after {
      background-image: linear-gradient(135deg, #0383b2 0%, #69d7f3 100%);
      bottom: 0;
      content: "";
      display: block;
      height: 100%;
      left: 0;
      position: absolute;
      transition: all cubic-bezier(0.19, 1, 0.22, 1) 0.3s;
      width: 0px;
      z-index: -1;
    }

    .cta-btn:hover {
      -webkit-text-fill-color: white;
      text-decoration: none;
    }

    .cta-btn:hover::after {
      width: 100%;
    }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <h2>Page not found</h2>
    <div class="button-container">
      <a class="cta-btn" href="/">Home</a>
    </div>
  </div>
</body>
</html>
